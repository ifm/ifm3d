build:windows_2019:
  stage: build
  tags:
    - shared_docker_windows
  image:
    name: ${DOCKER_IMAGE_WINDOWS_BUILDER}
    entrypoint: ["cmd", "/S", "/C"]
  script:
    - git config --global --add safe.directory '*'
    - 'cmake.exe -B build -G "Visual Studio 16 2019" -Ax64 -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON -DBUILD_MODULE_PCICCLIENT=ON -DCREATE_WIN_INSTALLER=ON .'
    - cd build
    - "cmake.exe --build . -j 8 --config Debug --target ALL_BUILD"
    - "cmake.exe --build . -j 8 --config Release --target ALL_BUILD"
  artifacts:
    name: "ifm3d_windows_build"
    paths:
      - build/
    expire_in: 1 week
  needs: []

build:windows_2019:python_wheel:
  stage: build
  tags:
    - shared_docker_windows
  image:
    name: ${DOCKER_IMAGE_WINDOWS_BUILDER}
    entrypoint: ["cmd", "/S", "/C"]
  parallel:
    matrix: !reference [.configs, python-windows-matrix]
  variables:
    IFM3D_CMAKE_GENERATOR: "Visual Studio 16 2019"
    CONFIG: Release
  script:
    - git config --global --add safe.directory '*'
    - |
      & C:/python/python.${env:PYTHON_VERSION}/tools/python.exe -m pip wheel ${CI_PROJECT_DIR} --no-deps -w ${CI_PROJECT_DIR}\wheelhouse/
  artifacts:
    paths:
      - wheelhouse/*.whl
    expire_in: 1 week
  rules:
    - !reference [.tagged, rules]
    - !reference [.nightly, rules]
    - !reference [.manual, rules]
  needs: []

include:
  - component: $CI_SERVER_FQDN/ifm-public/standard/components/code-signing@~latest
    inputs:
      file: '$CI_PROJECT_DIR/build/*/*/*/*.[ed][xl][el]'
      client-id: 0ebeac6b-d57a-495e-b994-ca158bd94791
      stage: build
      application: windows_2019
      description: https://ifm3d.com/

sign:windows_2019:
  stage: build
  needs:
    - job: build:windows_2019
      artifacts: true
  artifacts:
    paths:
      - build/
    expire_in: 1 week
